<!DOCTYPE html>
<html>
<head>
    <title>Signup</title>
</head>

<body style="background:#1e293b; color:white; font-family:Poppins; text-align:center;">

<h2>Create Account</h2>

<form method="POST" style="max-width:300px; margin:auto;">
    {% csrf_token %}

    <input type="text" name="username" placeholder="Username" required style="width:100%; padding:10px; margin:10px;"><br>

    <input type="password" name="password" placeholder="Password" required style="width:100%; padding:10px; margin:10px;"><br>

    <button type="submit" style="padding:10px 20px; border:none; border-radius:20px;
    background:linear-gradient(45deg,#22c55e,#c084fc); color:white;">
        Sign Up
    </button>
</form>

{% if error %}
<p style="color:red;">{{ error }}</p>
{% endif %}

<p>Already have an account? 
<a href="{% url 'login' %}" style="color:#22c55e;">Login</a>
</p>

</body>
</html>
