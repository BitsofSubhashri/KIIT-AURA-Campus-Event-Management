<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-box {
            background: rgba(255,255,255,0.1);
            padding: 35px;
            border-radius: 18px;
            backdrop-filter: blur(12px);
            width: 320px;
            text-align: center;
            color: white;
            box-shadow: 0 0 25px rgba(0,0,0,0.3);
        }

        h2 {
            margin-bottom: 20px;
        }

        .login-box input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 10px;
            border: none;
            outline: none;
        }

        .login-box button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(45deg,#22c55e,#c084fc);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .login-box button:hover {
            transform: scale(1.05);
        }

        .errorlist {
            color: #ff6b6b;
            list-style: none;
            padding: 0;
        }
    </style>
</head>

<body>

<div class="login-box">
    <h2>Student Login</h2>

    <form method="POST">
        {% csrf_token %}

        {{ form.username }}
        {{ form.password }}

        <button type="submit">Login</button>
    </form>
    <p>Don't have an account? 
  <a href="{% url 'signup' %}">Sign up</a>
</p>
</div>

</body>
</html>
